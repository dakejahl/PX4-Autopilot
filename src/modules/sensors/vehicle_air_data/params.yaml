module_name: vehicle_air_data
parameters:
- group: Sensors
  definitions:
    SENS_BARO_QNH:
      description:
        short: QNH for barometer
      type: float
      default: 1013.25
      min: 500
      max: 1500
      unit: hPa
    SENS_BAR_AUTOCAL:
      description:
        short: Barometer auto calibration
        long: Automatically calibrate barometer based on the GNSS height
      category: System
      type: boolean
      default: 1
